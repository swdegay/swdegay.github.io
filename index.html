    <style>
      :root {
        --background-color: #fdfdfd;
        --text-color: #212121;
        --link-color: #212121;
        --link-hover-color: #999;
      }

      :has(#theme-toggle:checked) {
        --background-color: #212121;
        --text-color: #fdfdfd;
        --link-color: #fdfdfd;
      }

      body {
        font-family: monospace;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
        font-size: medium;
        background-color: var(--background-color);
        color: var(--text-color);
      }

      a { color: var(--link-color); }

      a:hover { color: var(--link-hover-color); }

      header {
        display: flex;
        align-items: center;
      }

      label[for='theme-toggle'] {
        font-size: small;
      }

      label[for='theme-toggle']:hover {
        cursor: pointer;
        color: var(--link-hover-color);
      }

      .content {
        width: 80%;
        margin: 3rem auto;
        padding: 0.7em;
        line-height: 1.4;
      }

      @media (min-width: 768px) {
        body { font-size: large; }
        .content { width: 66ch; }
      }
    </style>
  </head>
  <body>
    <div class="content">
      <header>

      </header>
      <main>

          <p>Email: <span><a href="mailto:mail&#x40;sethdegay&#x2e;dev">mail&#x40;sethdegay&#x2e;dev</a></span>.</p>
        </section>
      </main>
      <br>
      <footer>
        <div>
          <input type="checkbox" id="theme-toggle" hidden aria-label="Toggle light and dark theme">
          <label for="theme-toggle">☀ Switch theme</label>
        </div>
      </footer>
    </div>
  </body>
</html>
