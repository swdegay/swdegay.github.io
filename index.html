<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seth Degay</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
      /* color palette */
      :root {
        --background-light: #fdfdfd;
        --background-dark: #212121;

        --text-light: var(--background-dark);
        --text-dark: var(--background-light);

        --link-light: var(--background-dark);
        --link-dark: var(--background-light);
        --link-hover-color: #999;

        --theme-toggle-label-light: "Use dark theme";
        --theme-toggle-label-dark: "Use light theme";
      }

      /* light theme */
      :root {
        --background-color: var(--background-light);
        --text-color: var(--text-light);
        --link-color: var(--link-light);
        --theme-toggle-label: var(--theme-toggle-label-light);
      }

      /* dark theme */
      :has(#theme-toggle:checked) {
        --background-color: var(--background-dark);
        --text-color: var(--text-dark);
        --link-color: var(--link-dark);
        --theme-toggle-label: var(--theme-toggle-label-dark);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background-color: var(--background-dark);
          --text-color: var(--text-dark);
          --link-color: var(--link-dark);
          --theme-toggle-label: var(--theme-toggle-label-dark);
        }

        :has(#theme-toggle:checked) {
          --background-color: var(--background-light);
          --text-color: var(--text-light);
          --link-color: var(--link-light);
          --theme-toggle-label: var(--theme-toggle-label-light);
        }
      }

      body {
        font-family: monospace;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
        font-size: medium;
        background-color: var(--background-color);
        color: var(--text-color);
        transition: background-color 300ms ease;

        margin: 0;

        display: flex;
        min-height: 100vh;
        flex-direction: column;
        justify-content: space-between;
      }

      a { color: var(--link-color); }
      a:hover { color: var(--link-hover-color); }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }
      header a { text-decoration: none; }
      header h2 { margin: 0; }

      /*label[for='theme-toggle'] { font-size: small; }*/
      label[for='theme-toggle']:hover {
        cursor: pointer;
        color: var(--link-hover-color);
      }
      .theme-toggle-label::after {
        content: var(--theme-toggle-label);
      }

      .list {
        list-style-type: none;
        padding: 0;
        margin: 0;
      }
      .list-item { display: inline; }
      .list-item:not(:last-child)::after { content: '////'; }

      .project:not(:last-child) {
        margin-bottom: 1.5rem;
      }

      /*section ul.project li:not(:last-child) {
        margin-bottom: 0.25rem;
      }*/

      .tag {
        color: var(--text-color);
        font-size: small;
        white-space: nowrap;
        text-align: center;
      }

      .tag-container .tag:not(:last-child)::after { content: ' ∙ '; }

      .content {
        width: 80%;
        margin: 3rem auto;
        padding: 0.7em;
        line-height: 1.4;
      }

      .name {
        background-color: var(--link-color);
        color: var(--background-color);
        padding: 0.15em;
        transition: background-color 300ms ease;
      }

      .name:hover { background-color: var(--link-hover-color); }

      .no-select {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }

      .footer-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        overflow: hidden;
      }

      .footer-background {
        font-size: 15vw;
        font-weight: 900;
        white-space: nowrap;
        opacity: 0.08;
        line-height: 0.8;
        pointer-events: none;
        z-index: 1;
      }

      .footer-foreground {
        margin-top: -4vw;
        z-index: 2;
        text-align: center;
        width: 100%;
        position: relative;
      }

      .footer-bottom {
        background-color: var(--background-color);
        color: var(--text-color);
        padding: 0.25rem 4rem;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid var(--link-hover-color);
        transition: background-color 300ms ease;
      }

      @media (min-width: 768px) {
        body { font-size: large; }
        .content { width: 66ch; }
        .footer-bottom { flex-direction: row; }
      }
    </style>
  </head>
  <body>
    <div class="content">
      <header>
        <a href="/"><h2 class="name no-select">seth_degay;</h2></a>
      </header>
      <main>
        <section id="about">
          <p>Software developer based in the Philippines.</p>
          <ul class="list">
            <li class="list-item">
              <span><a href="mailto:mail&#x40;sethdegay&#x2e;dev">mail&#x40;sethdegay&#x2e;dev</a></span>
            </li>
            <!-- <li class="list-item">
              <span><a href="https://github.com/swdegay">Github</a></span>
            </li>
            <li class="list-item">
              <span><a href="">LinkedIn</a></span>
            </li>
            <li class="list-item">
              <span><a href="">Resume</a></span> -->
            </li>
          </ul>
        </section>
        <section id="projects">
          <h2>Projects</h2>
          <ul class="project list">
            <li>
             <a href="https://github.com/swdegay/Sequence">Sequence</a>: A sequential timer for structured task execution.
              <div class="tag-container">
                <span class="tag">Android</span>
                <span class="tag">Kotlin</span>
                <span class="tag">Jetpack</span>
                <span class="tag">Multi-module</span>
              </div>
            </li>
          </ul>
        </section>
      </main>
      <br>
    </div>
    <footer>
      <div class="footer-wrapper">
        <div class="footer-background no-select" aria-hidden="true">05e02c2b55a73c61c89affb91b919594</div>
        <div class="footer-foreground">
          <div class="footer-bottom">
            <div>
              <p>(C) 2026 Seth Degay</p>
            </div>
            <div>
              <input type="checkbox" id="theme-toggle" hidden aria-label="Toggle light and dark theme">
              <label for="theme-toggle" class="theme-toggle-label"></label>
            </div>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
